<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 영어 단어장 &amp; 시험지 메이커</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; color: #2c2c2a; }
.app { max-width: 780px; width: 100%; }
h1 { font-size: 21px; font-weight: 600; color: #1a1a18; margin-bottom: 0.25rem; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }

.tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; border-bottom: 1px solid #e8e8e6; }
.tab-btn { background: transparent; border: none; padding: 0.65rem 0.9rem; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn:hover { color: #185FA5; }
.tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.card { background: #fff; border: 1px solid #e8e8e6; border-radius: 14px; padding: 1.25rem 1.4rem; margin-bottom: 1.25rem; }
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; color: #1a1a18; }
.card h3 { font-size: 13px; font-weight: 600; margin: 1rem 0 0.5rem; color: #444; }
.hint { font-size: 12.5px; color: #999; line-height: 1.6; margin-bottom: 0.75rem; }
.hint code { background: #f0f0ee; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

label { display: block; font-size: 12.5px; color: #666; margin-bottom: 4px; font-weight: 500; }
input[type=text], input[type=number], textarea, select {
  width: 100%; border: 1px solid #dcdcd8; border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 14px; font-family: inherit; background: #fafaf8; color: #1a1a18;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: #185FA5; background: #fff; }
textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.field { margin-bottom: 0.85rem; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.row3 { display: grid; grid-template-columns: 2fr 2fr 1fr; gap: 0.75rem; align-items: end; }

.btn { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 0.6rem 1.1rem; font-size: 13.5px; cursor: pointer; color: #444; font-weight: 500; }
.btn:hover { background: #f0f0ee; }
.btn.primary { background: #185FA5; color: #fff; border-color: transparent; }
.btn.primary:hover { background: #0c447c; }
.btn.danger { color: #b33; border-color: #eecccc; }
.btn.danger:hover { background: #fdf0f0; }
.btn.small { padding: 0.35rem 0.7rem; font-size: 12.5px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.5rem; }

.word-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.word-table th { text-align: left; font-size: 11.5px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid #e8e8e6; }
.word-table td { padding: 8px 8px; border-bottom: 1px solid #f0f0ee; vertical-align: top; }
.word-table tr:last-child td { border-bottom: none; }
.tag { display: inline-block; background: #eef4fb; color: #185FA5; border-radius: 5px; padding: 1px 7px; font-size: 12px; margin: 2px 3px 0 0; }
.tag.anto { background: #fbeeee; color: #a33; }
.empty-note { color: #bbb; font-size: 12.5px; }
.muted { color: #aaa; font-size: 12px; }
.row-actions { white-space: nowrap; }
.count-badge { background: #185FA5; color: #fff; border-radius: 10px; padding: 0 6px; font-size: 11px; }

.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 0.75rem; }
.preview-table th { text-align: left; font-size: 11px; color: #999; padding: 5px 6px; border-bottom: 1px solid #e8e8e6; }
.preview-table td { padding: 4px 6px; border-bottom: 1px solid #f2f2f0; }
.preview-table input { padding: 4px 6px; font-size: 12.5px; }
.preview-table td.chk { width: 26px; text-align: center; }

.quiz-options { display: flex; flex-direction: column; gap: 0.85rem; }
.type-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; background: #fafaf8; border: 1px solid #e8e8e6; border-radius: 10px; padding: 0.75rem 0.9rem; }
.type-check { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #333; font-weight: 400; cursor: pointer; }
.type-check input { width: auto; }

.group-block { border: 1px solid #e8e8e6; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.group-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #fafaf8; cursor: pointer; user-select: none; }
.group-header:hover { background: #f0f0ee; }
.group-toggle { font-size: 11px; color: #888; width: 10px; }
.group-name { font-size: 14px; font-weight: 600; color: #1a1a18; flex: 1; }
.group-count { font-size: 12px; color: #888; }
.group-block .word-table { padding: 4px; }

.worksheet { background: #fff; border: 1px solid #e8e8e6; border-radius: 14px; padding: 1.75rem; }
.ws-header { text-align: center; margin-bottom: 1.25rem; border-bottom: 2px solid #1a1a18; padding-bottom: 1rem; }
.ws-header h2 { font-size: 19px; margin-bottom: 0.6rem; }
.ws-meta { display: flex; justify-content: center; gap: 1.5rem; font-size: 13px; color: #444; }
.ws-sections { counter-reset: q; display: flex; flex-direction: column; gap: 1.5rem; }
.ws-instruction { font-size: 14px; font-weight: 600; color: #1a1a18; background: #f0f5fa; border-left: 3px solid #185FA5; padding: 0.5rem 0.75rem; margin-bottom: 0.6rem; }
.ws-questions { list-style: none; }
.ws-questions li { counter-increment: q; padding: 0.65rem 0; border-bottom: 1px dashed #eee; }
.ws-questions li::before { content: counter(q) ". "; font-weight: 600; color: #185FA5; }
.ws-q { display: inline; font-size: 14.5px; }
.ws-blank { margin-top: 8px; border-bottom: 1px solid #ccc; height: 1.4em; }
.ws-slot { display: inline-flex; align-items: baseline; margin: 8px 1.75rem 0 0; font-size: 14.5px; }
.ws-slot-eq { color: #185FA5; font-weight: 700; margin-right: 3px; }
.ws-slot-letter { font-weight: 600; }
.ws-slot-line { display: inline-block; width: 3.4em; border-bottom: 1px solid #999; height: 1.1em; margin-left: 2px; }
.ws-slots { display: flex; flex-wrap: wrap; }
.ws-questions li { break-inside: avoid; page-break-inside: avoid; }
.ws-options { display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem; margin-top: 8px; padding-left: 1.2rem; font-size: 13.5px; }
.answer-key { margin-top: 2rem; padding-top: 1rem; border-top: 2px solid #1a1a18; }
.answer-key h3 { font-size: 15px; margin-bottom: 0.75rem; }
.answer-key ol { padding-left: 1.4rem; font-size: 13.5px; line-height: 1.9; columns: 2; }
.hide-answers .answer-key { display: none; }
.ws-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.check-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
.warn-box { background: #fff8e8; border: 1px solid #f0dca0; color: #7a5c00; border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 13px; margin-bottom: 0.75rem; }

@media print {
  body * { visibility: hidden; }
  .worksheet, .worksheet * { visibility: visible; }
  .worksheet { position: absolute; top: 0; left: 0; width: 100%; border: none; padding: 0; border-radius: 0; }
  .ws-controls { display: none !important; }
  .answer-key { page-break-before: always; }
}
@media (max-width: 560px) {
  .row2, .row3 { grid-template-columns: 1fr; }
  .word-table { display: block; overflow-x: auto; }
}
</style>
</head>
<body>
<div class="app">
  <h1>📘 나만의 영어 단어장</h1>
  <p class="subtitle">단어·뜻·동의어·반의어를 모아두고, 랜덤으로 섞어 오프라인 시험지를 인쇄해보세요</p>
  <datalist id="groupOptions"></datalist>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="list">📖 단어장 <span class="count-badge" id="wordCountBadge">0</span></button>
    <button class="tab-btn" data-tab="add">➕ 데이터 추가</button>
    <button class="tab-btn" data-tab="test">🖨️ 시험지 만들기</button>
  </nav>

  <!-- 단어장 -->
  <section id="tab-list" class="tab-panel active">
    <div class="card">
      <h2>단어 목록</h2>
      <div class="field">
        <input type="text" id="searchBox" placeholder="단어 또는 뜻으로 검색...">
      </div>
      <div id="wordListWrap"></div>
      <div class="btn-row">
        <button class="btn" id="exportBtn">⬇️ 백업(JSON) 내보내기</button>
        <button class="btn" id="importBtn">⬆️ 백업 불러오기</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
        <button class="btn primary" id="shareLinkBtn">🔗 공유 링크 만들기</button>
        <button class="btn danger" id="clearAllBtn">🗑️ 전체 삭제</button>
      </div>
      <div id="shareLinkWrap"></div>
    </div>
  </section>

  <!-- 데이터 추가 -->
  <section id="tab-add" class="tab-panel">
    <div class="card">
      <h2>직접 추가</h2>
      <div class="field">
        <label>그룹 / Day (예: Day1 — 비워두면 미분류로 저장돼요)</label>
        <input type="text" id="manualGroup" list="groupOptions" placeholder="예: Day1">
      </div>
      <div class="row2">
        <div class="field"><label>단어 (영어)</label><input type="text" id="manualWord" placeholder="예: abandon"></div>
        <div class="field"><label>뜻 (한글)</label><input type="text" id="manualMeaning" placeholder="예: 버리다, 포기하다"></div>
      </div>
      <div class="row2">
        <div class="field"><label>동의어 (쉼표로 구분)</label><input type="text" id="manualSyn" placeholder="예: desert, forsake"></div>
        <div class="field"><label>반의어 (쉼표로 구분)</label><input type="text" id="manualAnt" placeholder="예: keep, maintain"></div>
      </div>
      <button class="btn primary" id="manualAddBtn">단어장에 추가</button>
    </div>

    <div class="card">
      <h2>붙여넣기로 한번에 추가</h2>
      <p class="hint">
        다른 곳(엑셀, 구글시트, 워드 등)에서 단어 목록을 복사해 아래에 붙여넣으면 자동으로 표 형식으로 분석해드려요.<br>
        지원 형식 1 (표 형식, 탭·쉼표·공백 2칸으로 열 구분): <code>단어  뜻  동의어1/동의어2  반의어1/반의어2</code><br>
        지원 형식 2 (줄바꿈 형식): <code>abandon - 버리다</code> 다음 줄에 <code>동의어: desert, forsake</code>, <code>반의어: keep, maintain</code>
      </p>
      <div class="field">
        <label>그룹 / Day (이 붙여넣기 전체에 적용, 예: Day1)</label>
        <input type="text" id="pasteGroup" list="groupOptions" placeholder="예: Day1">
      </div>
      <div class="field">
        <textarea id="pasteArea" placeholder="여기에 단어 목록을 붙여넣으세요..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="parseBtn">🔍 자동 분석하기</button>
        <button class="btn" id="loadSampleBtn">예시 데이터 넣어보기</button>
      </div>
      <div id="parsePreviewWrap"></div>
    </div>
  </section>

  <!-- 시험지 만들기 -->
  <section id="tab-test" class="tab-panel">
    <div class="card">
      <h2>시험지 옵션</h2>
      <div class="quiz-options">
        <div class="field">
          <label>포함할 그룹 / Day (체크한 그룹의 단어만 출제돼요)</label>
          <div class="type-checks" id="groupChecks"></div>
          <div class="btn-row">
            <button class="btn small" id="selectAllGroupsBtn">전체 선택</button>
            <button class="btn small" id="clearAllGroupsBtn">전체 해제</button>
          </div>
        </div>
        <div class="field">
          <label>문제 유형 (여러 개 체크하면 무작위로 섞여서 출제돼요)</label>
          <div class="type-checks" id="typeChecks">
            <label class="type-check"><input type="checkbox" class="type-chk" value="meaning-write" checked> 단어 → 뜻 쓰기 (주관식)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="word-write"> 뜻 → 영단어 쓰기 (주관식)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="synonym-write"> 단어 → 동의어 쓰기 (주관식)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="synonym-choice"> 단어 → 동의어 모두 고르기 (객관식)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="antonym-write"> 단어 → 반의어 쓰기 (주관식)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="meaning-choice"> 단어 → 뜻 고르기 (4지선다)</label>
            <label class="type-check"><input type="checkbox" class="type-chk" value="word-choice"> 뜻 → 단어 고르기 (4지선다)</label>
          </div>
          <div class="btn-row">
            <button class="btn small" id="selectAllTypesBtn">전체 선택</button>
            <button class="btn small" id="clearAllTypesBtn">전체 해제</button>
          </div>
        </div>
        <div class="row3">
          <div class="field"><label>문제 수</label><input type="number" id="quizCount" min="1" max="100" value="20"></div>
          <div class="field"><label>시험지 제목</label><input type="text" id="quizTitle" value="영어 단어 시험지"></div>
          <div class="field">
            <label>지면 단수</label>
            <select id="quizColumns">
              <option value="1">1단</option>
              <option value="2">2단</option>
              <option value="3">3단</option>
            </select>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="generateBtn">시험지 만들기</button>
        </div>
      </div>
    </div>

    <div id="worksheetWrap"></div>
  </section>
</div>

<script>
/* ---------------- storage ---------------- */
const STORAGE_KEY = 'vocabWords';
let words = loadWords();

function loadWords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function saveWords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}
function genId() {
  return 'w_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const DEFAULT_GROUP = '미분류';
function getGroupOf(w) { return (w.group && w.group.trim()) || DEFAULT_GROUP; }
function naturalCompare(a, b) { return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }); }
function getUniqueGroups() { return Array.from(new Set(words.map(getGroupOf))).sort(naturalCompare); }
function refreshGroupOptions() {
  const dl = document.getElementById('groupOptions');
  dl.innerHTML = getUniqueGroups().map(g => `<option value="${escapeAttr(g)}">`).join('');
}

/* ---------------- tabs ---------------- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ---------------- word list rendering ---------------- */
let editingId = null;
let searchTerm = '';
let openGroups = new Set();

function renderWordList() {
  document.getElementById('wordCountBadge').textContent = words.length;
  const wrap = document.getElementById('wordListWrap');
  if (words.length === 0) {
    wrap.innerHTML = '<p class="empty-note">아직 등록된 단어가 없어요. "데이터 추가" 탭에서 단어를 추가해보세요.</p>';
    return;
  }

  if (searchTerm) {
    const filtered = words.filter(w =>
      w.word.toLowerCase().includes(searchTerm) ||
      w.meaning.toLowerCase().includes(searchTerm)
    );
    wrap.innerHTML = filtered.length === 0
      ? '<p class="empty-note">검색 결과가 없어요.</p>'
      : renderWordTable(filtered, true);
    return;
  }

  const groups = getUniqueGroups();
  wrap.innerHTML = groups.map(g => {
    const list = words.filter(w => getGroupOf(w) === g);
    const isOpen = openGroups.has(g);
    return `
      <div class="group-block">
        <div class="group-header" onclick="toggleGroup('${escapeAttr(g)}')">
          <span class="group-toggle">${isOpen ? '▾' : '▸'}</span>
          <span class="group-name">${escapeHtml(g)}</span>
          <span class="group-count">${list.length}개</span>
          <button class="btn small" onclick="event.stopPropagation(); renameGroup('${escapeAttr(g)}')">이름 수정</button>
          <button class="btn small danger" onclick="event.stopPropagation(); deleteGroupWords('${escapeAttr(g)}')">그룹 삭제</button>
        </div>
        ${isOpen ? renderWordTable(list, false) : ''}
      </div>`;
  }).join('');
}

function renderWordTable(list, showGroupCol) {
  const colCount = showGroupCol ? 5 : 4;
  const rows = list.map(w => {
    if (editingId === w.id) {
      return `<tr>
        <td colspan="${colCount}">
          <div class="field" style="margin-bottom:6px;">
            <input type="text" id="edit-group" value="${escapeAttr(w.group || '')}" list="groupOptions" placeholder="그룹/Day (예: Day1)">
          </div>
          <div class="row2" style="margin-bottom:6px;">
            <input type="text" id="edit-word" value="${escapeAttr(w.word)}">
            <input type="text" id="edit-meaning" value="${escapeAttr(w.meaning)}">
          </div>
          <div class="row2" style="margin-bottom:6px;">
            <input type="text" id="edit-syn" value="${escapeAttr(w.synonyms.join(', '))}" placeholder="동의어">
            <input type="text" id="edit-ant" value="${escapeAttr(w.antonyms.join(', '))}" placeholder="반의어">
          </div>
          <button class="btn small primary" onclick="saveEdit('${w.id}')">저장</button>
          <button class="btn small" onclick="cancelEdit()">취소</button>
        </td>
      </tr>`;
    }
    return `<tr>
      ${showGroupCol ? `<td>${escapeHtml(getGroupOf(w))}</td>` : ''}
      <td><strong>${escapeHtml(w.word)}</strong></td>
      <td>${escapeHtml(w.meaning) || '<span class="muted">-</span>'}</td>
      <td>${renderTags(w.synonyms, 'syn')}${renderTags(w.antonyms, 'anto')}</td>
      <td class="row-actions">
        <button class="btn small" onclick="startEdit('${w.id}')">수정</button>
        <button class="btn small danger" onclick="deleteWord('${w.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
  return `<table class="word-table">
    <thead><tr>${showGroupCol ? '<th>그룹</th>' : ''}<th>단어</th><th>뜻</th><th>동의어 / 반의어</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
function renderTags(list, cls) {
  if (!list || !list.length) return '';
  return list.map(t => `<span class="tag ${cls === 'anto' ? 'anto' : ''}">${escapeHtml(t)}</span>`).join('');
}
function toggleGroup(g) {
  if (openGroups.has(g)) openGroups.delete(g);
  else openGroups.add(g);
  renderWordList();
}
function deleteGroupWords(g) {
  const count = words.filter(w => getGroupOf(w) === g).length;
  if (!confirm(`"${g}" 그룹의 단어 ${count}개를 모두 삭제할까요? 되돌릴 수 없습니다.`)) return;
  words = words.filter(w => getGroupOf(w) !== g);
  openGroups.delete(g);
  saveWords();
  renderWordList();
  refreshGroupOptions();
  renderGroupFilter();
}
function renameGroup(oldName) {
  const input = prompt(`"${oldName}" 그룹의 새 이름을 입력하세요.`, oldName);
  if (input === null) return;
  const newName = input.trim();
  if (!newName) { alert('그룹 이름은 비워둘 수 없어요.'); return; }
  if (newName === oldName) return;
  words.forEach(w => { if (getGroupOf(w) === oldName) w.group = newName; });
  if (openGroups.has(oldName)) { openGroups.delete(oldName); openGroups.add(newName); }
  if (uncheckedGroups.has(oldName)) { uncheckedGroups.delete(oldName); uncheckedGroups.add(newName); }
  saveWords();
  renderWordList();
  refreshGroupOptions();
  renderGroupFilter();
}
function startEdit(id) { editingId = id; renderWordList(); }
function cancelEdit() { editingId = null; renderWordList(); }
function saveEdit(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  w.group = document.getElementById('edit-group').value.trim();
  w.word = document.getElementById('edit-word').value.trim();
  w.meaning = document.getElementById('edit-meaning').value.trim();
  w.synonyms = splitList(document.getElementById('edit-syn').value);

  if (!Array.isArray(incoming) || incoming.length === 0) return;

/* ---------------- paste & auto parse ---------------- */
function splitList(str) {
  if (!str) return [];
  return str.split(/[,\/;、，]+/).map(s => s.trim()).filter(Boolean);
}

function parsePastedText(raw) {
  const text = raw.trim();
  if (!text) return [];
  const lines = text.split(/\r?\n/);
  const synLabel = /^(동의어|유의어|synonyms?|syn)\s*[:\-]\s*/i;
  const antLabel = /^(반의어|antonyms?|ant)\s*[:\-]\s*/i;
  const hasLabels = lines.some(l => synLabel.test(l.trim()) || antLabel.test(l.trim()));
  return hasLabels ? parseBlockFormat(lines, synLabel, antLabel) : parseTableFormat(lines);
}

function parseBlockFormat(lines, synLabel, antLabel) {
  const results = [];
  let current = null;
  lines.forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    if (synLabel.test(line)) {
      if (current) current.synonyms.push(...splitList(line.replace(synLabel, '')));
      return;
    }
    if (antLabel.test(line)) {
      if (current) current.antonyms.push(...splitList(line.replace(antLabel, '')));
      return;
    }
    const parsed = parseNewWordLine(line);
    if (!parsed.word) return;
    current = parsed;
    results.push(current);
  });
  return results;
}

function parseNewWordLine(line) {
  let cols;
  if (line.includes('\t')) cols = line.split('\t').map(s => s.trim());
  else if (/ {2,}/.test(line)) cols = line.split(/ {2,}/).map(s => s.trim());
  else if (/\s[-–:]\s/.test(line)) cols = line.split(/\s*[-–:]\s*/).map(s => s.trim());
  else cols = [line.trim()];
  return {
    word: cols[0] || '',
    meaning: cols[1] || '',
    synonyms: cols[2] ? splitList(cols[2]) : [],
    antonyms: cols[3] ? splitList(cols[3]) : []
  };
}

function parseTableFormat(lines) {
  const results = [];
  lines.forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    let cols;
    if (line.includes('\t')) cols = line.split('\t').map(s => s.trim());
    else if (/ {2,}/.test(line)) cols = line.split(/ {2,}/).map(s => s.trim());
    else if (line.includes(',')) cols = line.split(',').map(s => s.trim());
    else cols = [line];
    const word = cols[0] || '';
    if (!word) return;
    results.push({
      word,
      meaning: cols[1] || '',
      synonyms: cols[2] ? splitList(cols[2]) : [],
      antonyms: cols[3] ? splitList(cols[3]) : []
    });
  });
  return results;
}

/* ---------------- test / worksheet generation ---------------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n) {
  return shuffle(arr).slice(0, n);
}

const CHOICE_LABELS = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧'];

function synonymHintLetters(synonyms) {
  return (synonyms || []).map(s => s.trim().charAt(0)).filter(Boolean);
}

function typeApplies(w, type) {
  if (type === 'synonym-write' || type === 'synonym-choice') return !!(w.synonyms && w.synonyms.length);
  if (type === 'antonym-write') return !!(w.antonyms && w.antonyms.length);
  return true;
}

const TYPE_ORDER = ['meaning-write', 'word-write', 'synonym-write', 'synonym-choice', 'antonym-write', 'meaning-choice', 'word-choice'];
const TYPE_INSTRUCTIONS = {
  'meaning-write': '다음 단어의 뜻을 쓰시오.',
  'word-write': '다음 뜻에 해당하는 영어 단어를 쓰시오.',
  'synonym-write': '다음 단어의 동의어를 모두 쓰시오.',
  'synonym-choice': '다음 단어의 동의어를 보기에서 모두 고르시오.',
  'antonym-write': '다음 단어의 반의어를 모두 쓰시오.',
  'meaning-choice': '다음 단어의 알맞은 뜻을 고르시오.',
  'word-choice': '다음 뜻에 해당하는 단어를 고르시오.'
};

function buildQuestion(w, type, num) {
  switch (type) {
    case 'meaning-write':
      return { num, prompt: w.word, answer: w.meaning || '(뜻 없음)' };
    case 'word-write':
      return { num, prompt: w.meaning || w.word, answer: w.word };
    case 'synonym-write':
      return { num, prompt: w.word, answer: w.synonyms.join(', '), hintLetters: synonymHintLetters(w.synonyms) };
    case 'synonym-choice': {
      const correct = w.synonyms.slice();
      const correctLower = new Set(correct.map(s => s.toLowerCase()));
      const candidatePool = [];
      words.forEach(x => {
        if (x.id === w.id) return;
        candidatePool.push(x.word);
        (x.synonyms || []).forEach(s => candidatePool.push(s));
      });
      const uniqueCandidates = Array.from(new Set(
        candidatePool.filter(c => c && !correctLower.has(c.toLowerCase()) && c.toLowerCase() !== w.word.toLowerCase())
      ));
      const distractors = sample(uniqueCandidates, 3);
      const options = shuffle([...correct, ...distractors]);
      const correctLabels = options
        .map((o, i) => correctLower.has(o.toLowerCase()) ? CHOICE_LABELS[i] : null)
        .filter(Boolean)
        .join(' ');
      return { num, prompt: w.word, options, multi: true, answer: `${correctLabels} (${correct.join(', ')})` };
    }
    case 'antonym-write':
      return { num, prompt: w.word, answer: w.antonyms.join(', ') };
    case 'meaning-choice': {
      const distractors = sample(words.filter(x => x.id !== w.id && x.meaning), 3).map(x => x.meaning);
      const options = shuffle([w.meaning || '(뜻 없음)', ...distractors]);
      return { num, prompt: w.word, options, answer: w.meaning || '(뜻 없음)' };
    }
    case 'word-choice': {
      const distractors = sample(words.filter(x => x.id !== w.id), 3).map(x => x.word);
      const options = shuffle([w.word, ...distractors]);
      return { num, prompt: w.meaning || w.word, options, answer: w.word };
    }
  }
}

document.getElementById('selectAllTypesBtn').addEventListener('click', () => {
  document.querySelectorAll('.type-chk').forEach(c => c.checked = true);
});
document.getElementById('clearAllTypesBtn').addEventListener('click', () => {
  document.querySelectorAll('.type-chk').forEach(c => c.checked = false);
});

document.getElementById('generateBtn').addEventListener('click', () => {
  const selectedTypes = Array.from(document.querySelectorAll('.type-chk:checked')).map(c => c.value);
  const selectedGroups = Array.from(document.querySelectorAll('.group-chk:checked')).map(c => c.value);
  const countInput = parseInt(document.getElementById('quizCount').value, 10) || 20;
  const title = document.getElementById('quizTitle').value.trim() || '영어 단어 시험지';

  if (words.length === 0) { alert('단어장에 단어가 없어요. 먼저 단어를 추가해주세요.'); return; }
  if (selectedTypes.length === 0) { alert('문제 유형을 하나 이상 선택해주세요.'); return; }
  if (selectedGroups.length === 0) { alert('그룹/Day를 하나 이상 선택해주세요.'); return; }

  const basePool = words.filter(w => selectedGroups.includes(getGroupOf(w)) && selectedTypes.some(t => typeApplies(w, t)));
  if (basePool.length === 0) {
    alert('선택한 그룹과 유형 조건에 맞는 단어가 없어요.');
    return;
  }
  const count = Math.min(countInput, basePool.length, 100);
  const chosen = shuffle(basePool).slice(0, count);

  const assigned = chosen.map(w => {
    const validTypes = selectedTypes.filter(t => typeApplies(w, t));
    const t = validTypes[Math.floor(Math.random() * validTypes.length)];
    return { w, t };
  });

  let num = 0;
  const sections = TYPE_ORDER
    .filter(t => selectedTypes.includes(t))
    .map(t => ({
      type: t,
      instruction: TYPE_INSTRUCTIONS[t],
      questions: assigned.filter(a => a.t === t).map(a => buildQuestion(a.w, t, ++num))
    }))
    .filter(s => s.questions.length > 0);

  const columns = document.getElementById('quizColumns').value;
  renderWorksheet(title, sections, columns);
});

function renderWorksheet(title, sections, columns) {
  const wrap = document.getElementById('worksheetWrap');
  const totalCount = sections.reduce((sum, s) => sum + s.questions.length, 0);
  const colStyle = `column-count:${columns}; column-gap:2rem;`;

  const sectionsHtml = sections.map(s => {
    const qHtml = s.questions.map(q => `
      <li>
        <span class="ws-q">${escapeHtml(q.prompt)}</span>
        ${q.options
          ? `<div class="ws-options">${q.options.map((o, i) => `<span>${CHOICE_LABELS[i]} ${escapeHtml(o)}</span>`).join('')}</div>`
          : (q.hintLetters
            ? `<div class="ws-slots">${q.hintLetters.map(l => `<span class="ws-slot"><span class="ws-slot-eq">=</span><span class="ws-slot-letter">${escapeHtml(l)}</span><span class="ws-slot-line"></span></span>`).join('')}</div>`
            : `<div class="ws-blank"></div>`)}
      </li>`).join('');
    return `
      <div class="ws-section">
        <div class="ws-instruction">※ ${escapeHtml(s.instruction)}</div>
        <ol class="ws-questions" style="${colStyle}">${qHtml}</ol>
      </div>`;
  }).join('');

  const keyHtml = sections.flatMap(s => s.questions).map(q => `<li>${escapeHtml(q.answer)}</li>`).join('');

  wrap.innerHTML = `
    <div class="ws-controls">
      <button class="btn" id="reshuffleBtn">🔀 다시 섞기</button>
      <button class="btn primary" id="printBtn">🖨️ 인쇄하기</button>
      <label class="check-row"><input type="checkbox" id="showAnswers" checked> 정답지 포함</label>
    </div>
    <div class="worksheet" id="worksheetEl">
      <div class="ws-header">
        <h2>${escapeHtml(title)}</h2>
        <div class="ws-meta"><span>이름: ______________</span><span>날짜: ______________</span><span>점수: ______ / ${totalCount}</span></div>
      </div>
      <div class="ws-sections">${sectionsHtml}</div>
      <div class="answer-key">
        <h3>정답</h3>
        <ol>${keyHtml}</ol>
      </div>
    </div>`;

  document.getElementById('reshuffleBtn').addEventListener('click', () => {
    document.getElementById('generateBtn').click();
  });
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('showAnswers').addEventListener('change', e => {
    document.getElementById('worksheetEl').classList.toggle('hide-answers', !e.target.checked);
  });
}

/* ---------------- utils ---------------- */
function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }
